  <style>
    :root {
      --green: #3D6B4E;
      --green-mid: #5A8A6A;
      --green-light: #EDF4EF;
      --text: #1C1C1E;
      --sub: #6C6C70;
      --border: #E5E5EA;
      --white: #FFFFFF;
      --bg: #F5F8F5;
      --nav: 68px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      overflow: hidden;
    }
    .app { display: flex; flex-direction: column; height: 100dvh; }
    .screen { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav) + 8px); }

    /* Header */
    .hdr { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 10; }
    .hdr h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .hdr-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }

    /* Search */
    .srch-wrap { padding: 10px 16px; background: var(--white); border-bottom: 1px solid var(--border); }
    .srch-inner { position: relative; }
    .srch-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--sub); pointer-events: none; }
    .srch-input { width: 100%; padding: 9px 12px 9px 34px; border-radius: 10px; border: none; background: var(--bg); font-size: 15px; color: var(--text); outline: none; }

    /* Filter toggle bar */
    .filter-toggle-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--white); border-bottom: 1px solid var(--border); }
    .filter-toggle-btn { display: flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 100px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; font-weight: 500; color: var(--sub); cursor: pointer; transition: all 0.15s; }
    .filter-toggle-btn.has-active { border-color: #6A1B9A; color: #6A1B9A; background: #F3E5F5; }
    .filter-toggle-btn:active { opacity: 0.75; }
    .filter-clear-btn { font-size: 13px; color: var(--sub); background: none; border: none; cursor: pointer; padding: 4px 4px; margin-left: auto; opacity: 0.7; }
    .filter-clear-btn:active { opacity: 0.4; }

    /* Filter panel */
    .filter-panel { background: var(--white); border-bottom: 1px solid var(--border); padding: 4px 0 10px; }
    .filter-row { display: flex; align-items: center; padding: 5px 16px; gap: 7px; flex-wrap: wrap; }
    .filter-row-label { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.6px; width: 52px; flex-shrink: 0; opacity: 0.7; }
    .season-chip { border: 1.5px solid var(--border); border-radius: 100px; padding: 5px 12px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; background: var(--bg); color: var(--sub); flex-shrink: 0; transition: all 0.15s; }
    .season-chip:active { opacity: 0.75; }
    .season-chip.active { border-color: transparent; color: white; }
    .season-chip.s-spring.active { background: #2E7D32; }
    .season-chip.s-summer.active { background: #E65100; }
    .season-chip.s-autumn.active { background: #BF360C; }
    .season-chip.s-winter.active { background: #1565C0; }
    .season-chip.fc-type.active  { background: #6A1B9A; }
    .season-chip.fc-loc.active   { background: #00695C; }
    .season-chip.fc-meth.active  { background: #5D4037; }
    .tag-btn { cursor: pointer; transition: opacity 0.15s; }
    .tag-btn:active { opacity: 0.65; }
    .filter-hdr { font-size: 13px; color: var(--sub); padding: 12px 16px 6px; font-weight: 500; }

    /* A-Z list */
    .sec-label { font-size: 12px; font-weight: 600; color: var(--sub); padding: 12px 16px 5px; text-transform: uppercase; letter-spacing: 0.6px; background: var(--bg); }
    .plant-row { display: flex; align-items: center; padding: 11px 16px; background: var(--white); border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; gap: 2px; }
    .plant-row:active { background: var(--green-light); }
    .pl-emoji { font-size: 26px; width: 42px; flex-shrink: 0; text-align: center; }
    .pl-info { flex: 1; }
    .pl-name { font-size: 16px; font-weight: 500; }
    .pl-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .pl-arr { color: #C7C7CC; font-size: 20px; font-weight: 300; }

    /* Detail slide */
    .detail { position: fixed; inset: 0; max-width: 430px; margin: 0 auto; background: var(--bg); z-index: 50; overflow-y: auto; transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); padding-bottom: calc(var(--nav) + 16px); }
    .detail.on { transform: translateX(0); }
    .det-hdr { background: var(--white); padding: 14px 16px; display: flex; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    .back-btn { display: flex; align-items: center; gap: 3px; color: var(--green); font-size: 16px; font-weight: 500; cursor: pointer; padding: 4px 10px 4px 0; }
    .det-hero { background: var(--white); padding: 28px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); }
    .det-emoji { font-size: 60px; line-height: 1; }
    .det-name { font-size: 26px; font-weight: 700; margin-top: 10px; letter-spacing: -0.3px; }
    .det-desc { font-size: 14px; color: var(--sub); margin-top: 8px; line-height: 1.55; max-width: 320px; margin-left: auto; margin-right: auto; }
    .info-blk { margin-top: 12px; background: var(--white); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .info-row { display: flex; align-items: flex-start; padding: 13px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
    .info-row:last-child { border-bottom: none; }
    .info-lbl { font-size: 13px; color: var(--sub); width: 120px; flex-shrink: 0; padding-top: 1px; }
    .info-val { font-size: 14px; font-weight: 500; flex: 1; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { border-radius: 100px; padding: 3px 10px; font-size: 12px; font-weight: 500; display: inline-block; }
    .tag-spring { background: #E8F5E9; color: #2E7D32; }
    .tag-summer { background: #FFF8E1; color: #E65100; }
    .tag-autumn { background: #FBE9E7; color: #BF360C; }
    .tag-winter { background: #E3F2FD; color: #1565C0; }
    .tag-loc { background: var(--green-light); color: var(--green); }
    .tag-type-vegetable { background: #E8F5E9; color: #2E7D32; }
    .tag-type-herb      { background: #EDE7F6; color: #6A1B9A; }
    .tag-type-fruit     { background: #FCE4EC; color: #C62828; }

    /* Method grid */
    .method-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 2px; }
    .method-cell { text-align: center; padding: 10px 6px; border-radius: 10px; transition: all 0.15s; }
    .method-cell.yes { cursor: pointer; }
    .method-cell.yes:active { opacity: 0.75; }
    .method-cell.yes { background: var(--green-light); }
    .method-cell.no { background: #F0F0F0; opacity: 0.45; }
    .method-cell.yes.sel { background: var(--green); }
    .method-icon { font-size: 20px; }
    .method-lbl { font-size: 11px; margin-top: 3px; font-weight: 500; }
    .method-cell.yes .method-lbl { color: var(--green); }
    .method-cell.no .method-lbl { color: #999; }
    .method-cell.yes.sel .method-lbl { color: white; }
    .method-tap { font-size: 9px; color: rgba(61,107,78,0.5); margin-top: 2px; }
    .method-cell.yes.sel .method-tap { color: rgba(255,255,255,0.6); }

    /* Method guide panel */
    .method-guide { background: #EFF7F1; padding: 13px 16px; border-bottom: 1px solid var(--border); }
    .method-guide-hd { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 10px; }
    .hydro-specs { background: white; border-radius: 8px; padding: 9px 11px; margin-bottom: 10px; display: flex; gap: 0; }
    .hydro-spec { flex: 1; text-align: center; }
    .hydro-spec + .hydro-spec { border-left: 1px solid var(--border); }
    .hydro-spec-lbl { font-size: 11px; color: var(--sub); }
    .hydro-spec-val { font-size: 15px; font-weight: 700; color: var(--green); margin-top: 2px; }
    .guide-row { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(61,107,78,0.1); }
    .guide-row:last-child { border-bottom: none; padding-bottom: 0; }
    .guide-lbl { font-size: 12px; font-weight: 600; color: var(--sub); width: 72px; flex-shrink: 0; padding-top: 1px; text-transform: uppercase; letter-spacing: 0.3px; }
    .guide-val { font-size: 13px; color: var(--text); line-height: 1.5; flex: 1; }

    /* Add btn */
    .add-btn { display: block; margin: 16px; width: calc(100% - 32px); background: var(--green); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .add-btn:active { opacity: 0.82; }

    /* Backup button & sheet */
    .backup-fab { position: fixed; top: 10px; right: 14px; z-index: 200; background: none; border: none; font-size: 19px; cursor: pointer; padding: 6px; opacity: 0.55; -webkit-tap-highlight-color: transparent; }
    .backup-fab:active { opacity: 0.3; }
    .backup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.38); z-index: 300; display: flex; align-items: flex-end; justify-content: center; }
    .backup-sheet { background: var(--white); border-radius: 20px 20px 0 0; padding: 22px 20px calc(34px + env(safe-area-inset-bottom,0)); width: 100%; max-width: 430px; }
    .backup-sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .backup-sheet-desc { font-size: 13px; color: var(--sub); margin-bottom: 18px; line-height: 1.45; }
    .backup-action { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); font-size: 15px; font-weight: 500; color: var(--text); cursor: pointer; margin-bottom: 10px; text-align: left; }
    .backup-action:active { opacity: 0.7; }
    .backup-action-icon { font-size: 20px; }
    .backup-cancel { display: block; width: 100%; padding: 13px; border: none; border-radius: 12px; background: transparent; font-size: 15px; color: var(--sub); cursor: pointer; margin-top: 4px; }

    /* Bottom nav */
    .bnav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: 0 auto; height: var(--nav); background: var(--white); border-top: 1px solid var(--border); display: flex; align-items: flex-start; padding-top: 8px; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0); }
    .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 0; position: relative; }
    .nav-icon { font-size: 22px; }
    .nav-lbl { font-size: 10px; color: var(--sub); font-weight: 500; }
    .nav-tab.active .nav-lbl { color: var(--green); }
    .nav-badge { background: var(--green); color: white; border-radius: 100px; padding: 1px 5px; font-size: 10px; font-weight: 700; position: absolute; top: -2px; right: 18px; }

    /* Sort bar */
    .sort-bar { display: flex; gap: 7px; padding: 10px 16px; background: var(--white); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; align-items: center; }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-chip { border: 1.5px solid var(--border); border-radius: 100px; padding: 5px 13px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; background: var(--bg); color: var(--sub); flex-shrink: 0; transition: all 0.15s; }
    .sort-chip:active { opacity: 0.75; }
    .sort-chip.active { border-color: transparent; background: var(--green); color: white; }
    .g-group-hdr { font-size: 11px; font-weight: 700; color: var(--sub); padding: 14px 16px 4px; text-transform: uppercase; letter-spacing: 0.7px; }

    /* Garden entries */
    .g-entry { background: var(--white); margin: 12px 16px 0; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
    .g-entry.g-highlight { animation: gEntryFlash 1.4s ease; }
    @keyframes gEntryFlash { 0%,100%{box-shadow:none} 15%,55%{box-shadow:0 0 0 3px var(--green)} }
    .g-top { display: flex; align-items: center; gap: 10px; padding: 14px 14px 12px; cursor: pointer; transition: background 0.1s; }
    .g-top:active { background: var(--green-light); }
    .g-emoji { font-size: 34px; }
    .g-info { flex: 1; }
    .g-name { font-size: 17px; font-weight: 600; }
    .g-date { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .g-arr { color: #C7C7CC; font-size: 20px; font-weight: 300; }
    .g-stage { background: var(--green-light); padding: 10px 14px 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: filter 0.1s; }
    .g-stage:active { filter: brightness(0.95); }
    .g-stage.harvest { background: #FFF8E1; }
    .g-days { font-size: 15px; font-weight: 700; color: var(--green); }
    .g-stage.harvest .g-days { color: #C17F0A; }
    .g-lbl { font-size: 13px; color: var(--green); }
    .g-stage.harvest .g-lbl { color: #C17F0A; }
    .g-edit-hint { font-size: 11px; color: rgba(61,107,78,0.55); margin-top: 1px; }
    .g-stage.harvest .g-edit-hint { color: rgba(193,127,10,0.55); }
    .prog-wrap { height: 3px; background: rgba(61,107,78,0.12); overflow: hidden; }
    .prog-fill { height: 100%; background: var(--green); border-radius: 2px; }
    .prog-wrap.harvest .prog-fill { background: #C17F0A; }

    /* Empty state */
    .empty { text-align: center; padding: 64px 32px; }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-title { font-size: 20px; font-weight: 600; }
    .empty-sub { font-size: 15px; color: var(--sub); margin-top: 8px; line-height: 1.5; }

    /* FAB */
    .fab { position: fixed; bottom: calc(var(--nav) + 14px); right: 20px; width: 54px; height: 54px; border-radius: 50%; background: var(--green); color: white; border: none; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 14px rgba(61,107,78,0.38); z-index: 90; transition: transform 0.1s; }
    .fab:active { transform: scale(0.93); }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.38); z-index: 200; display: flex; align-items: flex-end; max-width: 430px; margin: 0 auto; }
    .sheet { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-height: 88vh; display: flex; flex-direction: column; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); }
    .handle { width: 38px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
    .sh-title { font-size: 18px; font-weight: 700; padding: 14px 16px 8px; flex-shrink: 0; }
    .sh-search { padding: 6px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sh-list { overflow-y: auto; flex: 1; }
    .sh-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; gap: 12px; }
    .sh-row:active { background: var(--green-light); }
    .sh-emoji { font-size: 26px; width: 34px; text-align: center; }
    .sh-name { font-size: 16px; font-weight: 500; }
    .sh-meta { font-size: 12px; color: var(--sub); margin-top: 1px; }
    .sh-body { padding: 16px; overflow-y: auto; flex: 1; }
    .sh-plant-preview { text-align: center; margin-bottom: 18px; }
    .sh-plant-preview .em { font-size: 44px; }
    .sh-plant-preview .nm { font-size: 18px; font-weight: 700; margin-top: 6px; }
    .date-lbl { font-size: 14px; color: var(--sub); margin-bottom: 6px; display: block; }
    .date-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; color: var(--text); background: var(--white); }
    .date-input:focus { border-color: var(--green); }
    .btn-primary { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 14px; cursor: pointer; }
    .btn-primary:active { opacity: 0.85; }
    .btn-del { width: 100%; padding: 14px; background: #FFF0F0; color: #D03030; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 8px; cursor: pointer; }
    .del-confirm { margin-top: 8px; background: #FFF0F0; border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .del-confirm-msg { font-size: 14px; font-weight: 600; color: #D03030; text-align: center; }
    .del-confirm-yes { padding: 11px; background: #D03030; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .del-confirm-no  { padding: 10px; background: transparent; color: var(--sub); border: none; font-size: 14px; cursor: pointer; }
    .btn-cancel { width: 100%; padding: 12px; background: transparent; color: var(--sub); border: none; font-size: 16px; margin-top: 4px; cursor: pointer; }
    .edit-preview { background: var(--bg); border-radius: 12px; padding: 14px; margin: 0 0 4px; text-align: center; }
    .edit-preview .em { font-size: 38px; }
    .edit-preview .nm { font-size: 17px; font-weight: 700; margin-top: 6px; }
    .edit-preview .dt { font-size: 13px; color: var(--sub); margin-top: 2px; }

    /* Nickname input */
    .nick-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; color: var(--text); background: var(--white); margin-bottom: 0; }
    .nick-input:focus { border-color: var(--green); }
    .field-lbl { font-size: 14px; color: var(--sub); margin-bottom: 6px; margin-top: 14px; display: block; }
    .notes-input { width: 100%; min-height: 76px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; color: var(--text); background: var(--white); resize: vertical; font-family: inherit; line-height: 1.5; }
    .notes-input:focus { border-color: var(--green); }
    .g-notes { font-size: 12px; color: var(--sub); margin-top: 5px; line-height: 1.45; font-style: italic; }
    .g-diary-sec { border-top: 1px solid var(--border); background: #FAFAFA; }
    .g-diary-hdr { font-size: 11px; font-weight: 700; color: #7B68EE; padding: 7px 14px 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .g-diary-row { display: flex; align-items: center; padding: 9px 14px; border-top: 1px solid var(--border); cursor: pointer; gap: 8px; transition: background 0.1s; }
    .g-diary-row:active { background: #EDE7F6; }
    .g-diary-date { font-size: 13px; color: var(--text); flex: 1; font-weight: 500; }
    .g-diary-wx   { font-size: 14px; line-height: 1; }
    .g-diary-arr  { color: #C7C7CC; font-size: 18px; }

    /* Method selector in forms */
    .method-select { display: flex; gap: 8px; }
    .msel-btn { flex: 1; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 500; color: var(--sub); cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.4; }
    .msel-btn .msel-icon { font-size: 18px; display: block; margin-bottom: 3px; }

    .diary-gplant-chip { background: #E8EAF6; color: #3949AB; border-radius: 100px; padding: 3px 9px; font-size: 12px; font-weight: 500; }

// ─── HELPERS ───────────────────────────────────────────────────
function getDaysSince(d) {
  if (!d) return null;
  const pl = new Date(d); pl.setHours(0,0,0,0);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.max(0, Math.floor((now - pl) / 86400000));
}
function getStage(plant, days, method) {
  if (days === null) return null;
  // Hydro grows ~35% faster; pot is slightly slower than ground
  const speedMult = method === 'hydro' ? 0.65 : method === 'pot' ? 1.05 : 1.0;
  const max = plant.days.max * speedMult;
  const pct = days / max;
  if (days >= max) return { label:'Ready to harvest!', type:'harvest' };
  if (method === 'hydro') {
    if (days === 0)  return { label:'Just transplanted', type:'normal' };
    if (days <= 3)   return { label:'Establishing roots', type:'normal' };
    if (pct < 0.15)  return { label:'Early vegetative', type:'normal' };
    if (pct < 0.35)  return { label:'Rapid growth phase', type:'normal' };
    if (pct < 0.55)  return { label:'Vegetative peak', type:'normal' };
    if (pct < 0.75)  return { label:'Pre-harvest stage', type:'normal' };
    if (pct < 0.90)  return { label:'Ripening', type:'near' };
    return { label:'Nearly ready!', type:'near' };
  }
  if (days === 0)  return { label:'Just planted', type:'normal' };
  if (days <= 4)   return { label:'Germinating', type:'normal' };
  if (pct < 0.12)  return { label:'Seedling stage', type:'normal' };
  if (pct < 0.30)  return { label:'Young plant', type:'normal' };
  if (pct < 0.50)  return { label:'Vegetative growth', type:'normal' };
  if (pct < 0.70)  return { label:'Developing & maturing', type:'normal' };
  if (pct < 0.90)  return { label:'Approaching harvest', type:'near' };
  return { label:'Nearly ready!', type:'near' };
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-NZ', {day:'numeric', month:'short', year:'numeric'});
}
function today() { return new Date().toISOString().split('T')[0]; }

// ─── PLANT DETAIL ───────────────────────────────────────────────
function PlantDetail({plant, visible, onBack, onAdd, onSeasonFilter, backLabel='Library'}) {
  const [expanded, setExpanded] = useState(null);
  useEffect(()=>{ setExpanded(null); }, [plant?.id]);
  if (!plant) return null;

  const isHydro = plant.hydro && plant.hydro !== false;
  const guide = GUIDES[plant.id] || {};

  function toggle(m) { setExpanded(prev => prev===m ? null : m); }

  const methodGuide = expanded==='pot' ? guide.pot : expanded==='ground' ? guide.ground : expanded==='hydro' ? guide.hydro : null;
  const guideTitle = expanded==='pot' ? '🪴 Growing in a Pot' : expanded==='ground' ? '🌍 Growing in the Ground' : expanded==='hydro' ? '💧 Hydroponic Growing' : '';

  return (
    <div className={`detail ${visible?'on':''}`}>
      <div className="det-hdr">
        <div className="back-btn" onClick={onBack}>‹ {backLabel}</div>
      </div>
      <div className="det-hero">
        <div className="det-emoji">{plant.emoji}</div>
        <div className="det-name">{plant.name}</div>
        <div className="det-desc">{plant.desc}</div>
      </div>
      <div className="info-blk">
        <div className="info-row">
          <div className="info-lbl">Type</div>
          <div className="info-val">
            <span className={`tag tag-type-${plant.type}`}>{plant.type ? plant.type[0].toUpperCase()+plant.type.slice(1) : '—'}</span>
          </div>
        </div>
        <div className="info-row">
          <div className="info-lbl">Days to harvest</div>
          <div className="info-val">{plant.days.min}–{plant.days.max} days</div>
        </div>
        <div className="info-row">
          <div className="info-lbl">Best seasons</div>
          <div className="info-val">
            <div className="tags">
              {plant.seasons.map(s=>(
                <SeasonTag key={s} s={s} onClick={onSeasonFilter ? ()=>onSeasonFilter(s) : undefined}/>
              ))}
            </div>
            {onSeasonFilter && <div style={{fontSize:11,color:'var(--sub)',marginTop:5}}>Tap a season to see all plants</div>}
          </div>
        </div>
        <div className="info-row">
          <div className="info-lbl">Location</div>
          <div className="info-val">
            <div className="tags">{plant.location.map(l=><span key={l} className="tag tag-loc">{l[0].toUpperCase()+l.slice(1)}</span>)}</div>
          </div>
        </div>
        <div className="info-row" style={expanded ? {borderBottom:'none'} : {}}>
          <div className="info-lbl">Growing method</div>
          <div className="info-val">
            <div style={{fontSize:11,color:'var(--sub)',marginBottom:8}}>Tap a supported method for a growing guide</div>
            <div className="method-grid">
              <div className={`method-cell ${plant.pot?'yes':'no'} ${expanded==='pot'?'sel':''}`}
                onClick={()=>plant.pot && toggle('pot')}>
                <div className="method-icon">🪴</div>
                <div className="method-lbl">Pot</div>
                {plant.pot && <div className="method-tap">{expanded==='pot'?'▲':'▼'}</div>}
              </div>
              <div className={`method-cell ${plant.ground?'yes':'no'} ${expanded==='ground'?'sel':''}`}
                onClick={()=>plant.ground && toggle('ground')}>
                <div className="method-icon">🌍</div>
                <div className="method-lbl">Ground</div>
                {plant.ground && <div className="method-tap">{expanded==='ground'?'▲':'▼'}</div>}
              </div>
              <div className={`method-cell ${isHydro?'yes':'no'} ${expanded==='hydro'?'sel':''}`}
                onClick={()=>isHydro && toggle('hydro')}>
                <div className="method-icon">💧</div>
                <div className="method-lbl">Hydroponic</div>
                {isHydro && <div className="method-tap">{expanded==='hydro'?'▲':'▼'}</div>}
              </div>
            </div>
          </div>
        </div>

        {/* Guide panel — full width below the entire row */}
        {expanded && (
          <div className="method-guide">
            <div className="method-guide-hd">{guideTitle}</div>
            {expanded==='hydro' && isHydro && (
              <div className="hydro-specs">
                <div className="hydro-spec">
                  <div className="hydro-spec-lbl">EC Level</div>
                  <div className="hydro-spec-val">{plant.hydro.ec.min}–{plant.hydro.ec.max}</div>
                  <div className="hydro-spec-lbl" style={{marginTop:1}}>mS/cm</div>
                </div>
                <div className="hydro-spec">
                  <div className="hydro-spec-lbl">pH Range</div>
                  <div className="hydro-spec-val">{plant.hydro.ph.min}–{plant.hydro.ph.max}</div>
                </div>
              </div>
            )}
            {methodGuide && methodGuide.map(([lbl,val])=>(
              <div key={lbl} className="guide-row">
                <div className="guide-lbl">{lbl}</div>
                <div className="guide-val">{val}</div>
              </div>
            ))}
            {!methodGuide && <div style={{fontSize:13,color:'var(--sub)'}}>Guide coming soon for this method.</div>}
          </div>
        )}
      </div>
      <button className="add-btn" onClick={()=>onAdd(plant)}>+ Add to My Garden</button>
      <div style={{height:32}}/>
    </div>
  );
}

// ─── LIBRARY TAB ────────────────────────────────────────────────
const LibraryTab = React.forwardRef(function LibraryTab({onAdd}, ref) {
  const [q, setQ]             = useState('');
  const [types, setTypes]         = useState(new Set());
  const [seasons, setSeasons]     = useState(new Set());
  const [locations, setLocations] = useState(new Set());
  const [methods, setMethods]     = useState(new Set());
  const [showFilters, setShowFilters] = useState(false);
  const [sel, setSel]         = useState(null);
  const [show, setShow]       = useState(false);
  const [mounted, setMounted] = useState(false);

  function toggle(setter, id) {
    setter(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }
  function clearAllFilters() { setTypes(new Set()); setSeasons(new Set()); setLocations(new Set()); setMethods(new Set()); setQ(''); }

  function open(p) {
    setSel(p); setMounted(true);
    requestAnimationFrame(()=>requestAnimationFrame(()=>setShow(true)));
  }
  function close() {
    setShow(false);
    setTimeout(()=>{ setMounted(false); setSel(null); }, 300);
  }
  React.useImperativeHandle(ref, ()=>({ closeDetail: ()=>{ if (mounted) close(); } }));
  function handleSeasonFilter(s) {
    close();
    setTimeout(()=>{ setSeasons(s==='all' ? new Set() : new Set([s])); setLocations(new Set()); setMethods(new Set()); setTypes(new Set()); setShowFilters(true); }, 260);
  }
  function handleAdd(p) { close(); onAdd(p); }

  const anyFilter = types.size>0 || seasons.size>0 || locations.size>0 || methods.size>0 || q;
  const activeCount = types.size + seasons.size + locations.size + methods.size + (q?1:0);
  const filtered = PLANTS
    .filter(p => { const ql=q.toLowerCase(); return p.name.toLowerCase().includes(ql) || (p.aliases||[]).some(a=>a.toLowerCase().includes(ql)); })
    .filter(p => types.size===0     || types.has(p.type))
    .filter(p => seasons.size===0   || [...seasons].every(s => p.seasons.includes(s)))
    .filter(p => locations.size===0 || [...locations].every(l => p.location.includes(l)))
    .filter(p => methods.size===0   || (
      (!methods.has('pot')    || p.pot) &&
      (!methods.has('ground') || p.ground) &&
      (!methods.has('hydro')  || !!p.hydro)
    ))
    .sort((a,b)=>a.name.localeCompare(b.name));

  const grouped = {};
  filtered.forEach(p=>{ const l=p.name[0].toUpperCase(); (grouped[l]=grouped[l]||[]).push(p); });

  const subLabel = anyFilter
    ? `${filtered.length} plant${filtered.length!==1?'s':''} found`
    : `${PLANTS.length} vegetables, herbs & more`;

  return (
    <div style={{position:'relative'}}>
      <div className="hdr"><h1>Plant Library</h1><div className="hdr-sub">{subLabel}</div></div>
      <div className="srch-wrap">
        <div className="srch-inner">
          <span className="srch-icon">🔍</span>
          <input className="srch-input" placeholder="Search plants…" value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
      </div>
      <div className="filter-toggle-bar">
        <button className={`filter-toggle-btn ${activeCount>0?'has-active':''}`} onClick={()=>setShowFilters(f=>!f)}>
          {activeCount>0 ? `Filter (${activeCount})` : 'Filter'} {showFilters ? '▴' : '▾'}
        </button>
        {activeCount>0 && <button className="filter-clear-btn" onClick={clearAllFilters}>Clear all</button>}
      </div>
      {showFilters && (
        <div className="filter-panel">
          <div className="filter-row">
            <span className="filter-row-label">Type</span>
            {TYPE_OPTS.map(o=>(
              <button key={o.id} className={`season-chip fc-type ${types.has(o.id)?'active':''}`} onClick={()=>setTypes(prev=>prev.has(o.id)?new Set():new Set([o.id]))}>
                {o.emoji} {o.label}
              </button>
            ))}
          </div>
          <div className="filter-row">
            <span className="filter-row-label">Season</span>
            {SEASON_OPTS.map(o=>(
              <button key={o.id} className={`season-chip s-${o.id} ${seasons.has(o.id)?'active':''}`} onClick={()=>toggle(setSeasons,o.id)}>
                {o.emoji} {o.label}
              </button>
            ))}
          </div>
          <div className="filter-row">
            <span className="filter-row-label">Location</span>
            {LOCATION_OPTS.map(o=>(
              <button key={o.id} className={`season-chip fc-loc ${locations.has(o.id)?'active':''}`} onClick={()=>toggle(setLocations,o.id)}>
                {o.emoji} {o.label}
              </button>
            ))}
          </div>
          <div className="filter-row">
            <span className="filter-row-label">Method</span>
            {METHOD_OPTS.map(o=>(
              <button key={o.id} className={`season-chip fc-meth ${methods.has(o.id)?'active':''}`} onClick={()=>toggle(setMethods,o.id)}>
                {o.emoji} {o.label}
              </button>
            ))}
          </div>
        </div>
      )}
      <div>
        {anyFilter && filtered.length>0 && (
          <div className="filter-hdr">{filtered.length} plant{filtered.length!==1?'s':''} match your filters</div>
        )}
        {!anyFilter
          ? Object.keys(grouped).sort().map(l=>(
              <div key={l}>
                <div className="sec-label">{l}</div>
                {grouped[l].map(p=>(
                  <div key={p.id} className="plant-row" onClick={()=>open(p)}>
                    <div className="pl-emoji">{p.emoji}</div>
                    <div className="pl-info">
                      <div className="pl-name">{p.name}</div>
                      <div className="pl-meta">{p.days.min}–{p.days.max} days · {p.seasons.map(s=>s[0].toUpperCase()+s.slice(1)).join(', ')}</div>
                    </div>
                    <div className="pl-arr">›</div>
                  </div>
                ))}
              </div>
            ))
          : filtered.map(p=>(
              <div key={p.id} className="plant-row" onClick={()=>open(p)}>
                <div className="pl-emoji">{p.emoji}</div>
                <div className="pl-info">
                  <div className="pl-name">{p.name}</div>
                  <div className="pl-meta">{p.days.min}–{p.days.max} days · {p.seasons.map(s=>s[0].toUpperCase()+s.slice(1)).join(', ')}</div>
                </div>
                <div className="pl-arr">›</div>
              </div>
            ))
        }
        {filtered.length===0 && (
          <div className="empty">
            <div className="empty-icon">🔍</div>
            <div className="empty-title">No plants found</div>
            <div className="empty-sub">Try adjusting your filters or search term</div>
          </div>
        )}
      </div>
      {mounted && <PlantDetail plant={sel} visible={show} onBack={close} onAdd={handleAdd} onSeasonFilter={handleSeasonFilter}/>}
    </div>
  );
});

// ─── GARDEN TAB ─────────────────────────────────────────────────
const GardenTab = React.forwardRef(function GardenTab({entries, onUpdate, initPlant, clearInit, diary, onOpenDiaryDate, initEntryId, clearInitEntry}, ref) {
  const [showAdd, setShowAdd]       = useState(false);
  const [showDate, setShowDate]     = useState(false);
  const [showEdit, setShowEdit]     = useState(false);
  const [pending, setPending]       = useState(null);
  const [editing, setEditing]       = useState(null);
  const [date, setDate]             = useState(today());
  const [nickname, setNickname]     = useState('');
  const [notes, setNotes]           = useState('');
  const [method, setMethod]         = useState('ground');
  const [q, setQ]                   = useState('');
  const [detSel, setDetSel]         = useState(null);
  const [showDet, setShowDet]       = useState(false);
  const [detMounted, setDetMounted] = useState(false);

  React.useImperativeHandle(ref, ()=>({ closeDetail: ()=>{ if (detMounted) closeDet(); } }));

  function defaultMethod(p) {
    return p.ground ? 'ground' : p.pot ? 'pot' : p.hydro ? 'hydro' : 'ground';
  }

  useEffect(()=>{
    if (initPlant){ setPending(initPlant); setDate(today()); setNickname(''); setNotes(''); setMethod(defaultMethod(initPlant)); setShowDate(true); clearInit(); }
  },[initPlant]);

  useEffect(()=>{
    if (!initEntryId) return;
    const el = document.getElementById('ge-'+initEntryId);
    if (el) {
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.classList.add('g-highlight');
      setTimeout(()=>el.classList.remove('g-highlight'), 1500);
    }
    clearInitEntry && clearInitEntry();
  },[initEntryId]);

  function pickPlant(p){ setPending(p); setDate(today()); setNickname(''); setNotes(''); setMethod(defaultMethod(p)); setShowAdd(false); setShowDate(true); }
  function confirmAdd(){
    if (!pending) return;
    onUpdate([...entries,{id:Date.now(), plantId:pending.id, datePlanted:date, nickname:nickname.trim(), notes:notes.trim(), method}]);
    setShowDate(false); setPending(null);
  }
  function openEdit(e){ setEditing(e); setDate(e.datePlanted); setNickname(e.nickname||''); setNotes(e.notes||''); setMethod(e.method||'ground'); setShowEdit(true); }
  function confirmEdit(){
    onUpdate(entries.map(e=>e.id===editing.id?{...e,datePlanted:date,nickname:nickname.trim(),notes:notes.trim(),method}:e));
    setShowEdit(false);
  }
  function del(){ onUpdate(entries.filter(e=>e.id!==editing.id)); setShowEdit(false); }

  function openDetail(p) {
    setDetSel(p); setDetMounted(true);
    requestAnimationFrame(()=>requestAnimationFrame(()=>setShowDet(true)));
  }
  function closeDet() {
    setShowDet(false);
    setTimeout(()=>{ setDetMounted(false); setDetSel(null); }, 300);
  }
  function handleDetAdd(p) { closeDet(); setPending(p); setDate(today()); setNickname(''); setNotes(''); setMethod(defaultMethod(p)); setShowDate(true); }

  const [sortBy, setSortBy] = useState('date-asc');

  const SORT_OPTS = [
    {id:'date-asc',  label:'🗓 Oldest'},
    {id:'date-desc', label:'🗓 Newest'},
    {id:'name',      label:'🔤 Name'},
    {id:'method',    label:'🪴 Method'},
    {id:'harvest',   label:'🌾 Harvest'},
  ];

  function sortedEntries() {
    const withMeta = entries.map(e => {
      const p = PLANTS.find(x=>x.id===e.plantId);
      const m = e.method || 'ground';
      const d = getDaysSince(e.datePlanted);
      const mult = m==='hydro'?0.65:m==='pot'?1.05:1.0;
      const pct = p ? Math.min(1, d / (p.days.max * mult)) : 0;
      return { e, p, m, d, pct };
    });
    if (sortBy==='date-asc')  return withMeta.sort((a,b)=>new Date(a.e.datePlanted)-new Date(b.e.datePlanted));
    if (sortBy==='date-desc') return withMeta.sort((a,b)=>new Date(b.e.datePlanted)-new Date(a.e.datePlanted));
    if (sortBy==='name')      return withMeta.sort((a,b)=>(a.e.nickname||a.p?.name||'').localeCompare(b.e.nickname||b.p?.name||''));
    if (sortBy==='method') {
      const order = {pot:0,ground:1,hydro:2};
      return withMeta.sort((a,b)=>(order[a.m]??1)-(order[b.m]??1) || (a.e.nickname||a.p?.name||'').localeCompare(b.e.nickname||b.p?.name||''));
    }
    if (sortBy==='harvest')   return withMeta.sort((a,b)=>b.pct-a.pct);
    return withMeta;
  }

  const filtPlants = PLANTS.filter(p=>{ const ql=q.toLowerCase(); return p.name.toLowerCase().includes(ql)||(p.aliases||[]).some(a=>a.toLowerCase().includes(ql)); }).sort((a,b)=>a.name.localeCompare(b.name));
  const editPlant = editing ? PLANTS.find(p=>p.id===editing.plantId) : null;

  function renderEntry(entry, p, entryMethod, days, pct) {
    if (!p) return null;
    const stage = getStage(p, days, entryMethod);
    const isH = stage.type==='harvest';
    const methodBadge = entryMethod==='hydro' ? {icon:'💧',label:'Hydroponic',cls:'hydro'} : entryMethod==='pot' ? {icon:'🪴',label:'Pot',cls:'pot'} : {icon:'🌍',label:'Ground',cls:''};
    const linkedDiary = (diary||[])
      .filter(de=>(de.gardenIds||[]).includes(entry.id))
      .sort((a,b)=>b.date.localeCompare(a.date));
    return (
      <div key={entry.id} id={'ge-'+entry.id} className="g-entry">
        <div className="g-top" onClick={()=>openDetail(p)}>
          <div className="g-emoji">{p.emoji}</div>
          <div className="g-info">
            <div className="g-name">{entry.nickname || p.name}</div>
            {entry.nickname ? <div className="g-sub-name">{p.name}</div> : null}
            <div className="g-date">Planted {fmtDate(entry.datePlanted)}</div>
            {sortBy!=='method' && <div className={`g-method-badge ${methodBadge.cls}`}>{methodBadge.icon} {methodBadge.label}</div>}
            {entry.notes ? <div className="g-notes">{entry.notes}</div> : null}
          </div>
          <div className="g-arr">›</div>
        </div>
        <div className={`g-stage ${isH?'harvest':''}`} onClick={()=>openEdit(entry)}>
          <div>
            <div className="g-days">{days} day{days!==1?'s':''}</div>
            <div className="g-lbl">{stage.label}</div>
            <div className="g-edit-hint">Tap to edit</div>
          </div>
          <div style={{fontSize:22}}>{isH?'🎉':days===0?'🌱':pct<0.5?'🌿':'🌸'}</div>
        </div>
        <div className={`prog-wrap ${isH?'harvest':''}`}>
          <div className="prog-fill" style={{width:`${pct*100}%`}}/>
        </div>
        {linkedDiary.length>0 && (
          <div className="g-diary-sec">
            <div className="g-diary-hdr">📔 {linkedDiary.length} diary entr{linkedDiary.length!==1?'ies':'y'}</div>
            {linkedDiary.map(de=>{
              const wx = WEATHER_OPTS.find(o=>o.id===de.weather);
              return (
                <div key={de.id} className="g-diary-row" onClick={()=>onOpenDiaryDate&&onOpenDiaryDate(de.date)}>
                  <span className="g-diary-date">{fmtDate(de.date)}</span>
                  {wx && <span className="g-diary-wx">{wx.emoji}</span>}
                  <span className="g-diary-arr">›</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{position:'relative'}}>
      <div className="hdr"><h1>My Garden</h1><div className="hdr-sub">{entries.length} plant{entries.length!==1?'s':''} growing</div></div>
      {entries.length>0 && (
        <div className="sort-bar">
          {SORT_OPTS.map(o=>(
            <button key={o.id} className={`sort-chip ${sortBy===o.id?'active':''}`} onClick={()=>setSortBy(o.id)}>{o.label}</button>
          ))}
        </div>
      )}

      {entries.length===0
        ? <div className="empty"><div className="empty-icon">🌱</div><div className="empty-title">Nothing planted yet</div><div className="empty-sub">Tap the + button to add a plant from the library.</div></div>
        : <div style={{paddingBottom:8}}>
            {(() => {
              const list = sortedEntries();
              const METHOD_GROUPS = [{key:'pot',icon:'🪴',label:'Pot'},{key:'ground',icon:'🌍',label:'Ground'},{key:'hydro',icon:'💧',label:'Hydroponic'}];
              if (sortBy==='method') {
                return METHOD_GROUPS.map(grp => {
                  const items = list.filter(({m})=>m===grp.key);
                  if (!items.length) return null;
                  return (
                    <div key={grp.key}>
                      <div className="g-group-hdr">{grp.icon} {grp.label}</div>
                      {items.map(({e:entry,p,m:entryMethod,d:days,pct})=>renderEntry(entry,p,entryMethod,days,pct))}
                    </div>
                  );
                });
              }
              return list.map(({e:entry,p,m:entryMethod,d:days,pct})=>renderEntry(entry,p,entryMethod,days,pct));
            })()}
          </div>
      }

      {detMounted && <PlantDetail plant={detSel} visible={showDet} onBack={closeDet} onAdd={handleDetAdd} backLabel="My Garden"/>}

      <button className="fab" onClick={()=>{setQ('');setShowAdd(true);}}>+</button>

      {showAdd && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAdd(false);}}>
          <div className="sheet">
            <div className="handle"/>
            <div className="sh-title">Add to My Garden</div>
            <div className="sh-search">
              <div className="srch-inner">
                <span className="srch-icon">🔍</span>
                <input className="srch-input" placeholder="Search plants…" value={q} onChange={e=>setQ(e.target.value)}/>
              </div>
            </div>
            <div className="sh-list">
              {filtPlants.map(p=>(
                <div key={p.id} className="sh-row" onClick={()=>pickPlant(p)}>
                  <div className="sh-emoji">{p.emoji}</div>
                  <div><div className="sh-name">{p.name}</div><div className="sh-meta">{p.days.min}–{p.days.max} days</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {showDate && pending && (
        <div className="overlay">
          <div className="sheet">
            <div className="handle"/>
            <div className="sh-title">Add to My Garden</div>
            <div className="sh-body">
              <div className="sh-plant-preview"><div className="em">{pending.emoji}</div><div className="nm">{pending.name}</div></div>
              <label className="field-lbl" style={{marginTop:0}}>Nickname <span style={{color:'#AAA',fontWeight:400}}>(optional)</span></label>
              <input className="nick-input" placeholder={`e.g. ${pending.name.split(' ')[0].toLowerCase()}1`} value={nickname} onChange={e=>setNickname(e.target.value)} maxLength={24}/>
              <label className="field-lbl">Growing method</label>
              <div className="method-select">
                {[{key:'pot',icon:'🪴',label:'Pot',ok:pending.pot},{key:'ground',icon:'🌍',label:'Ground',ok:pending.ground},{key:'hydro',icon:'💧',label:'Hydroponic',ok:!!pending.hydro}].map(m=>(
                  <button key={m.key} className={`msel-btn ${method===m.key?'active':''} ${!m.ok?'unavail':''}`}
                    onClick={()=>m.ok&&setMethod(m.key)}>
                    <span className="msel-icon">{m.icon}</span>{m.label}
                  </button>
                ))}
              </div>
              <label className="field-lbl">Notes <span style={{color:'#AAA',fontWeight:400}}>(optional)</span></label>
              <textarea className="notes-input" placeholder="e.g. variety, location…" value={notes} onChange={e=>setNotes(e.target.value)} maxLength={200}/>
              <label className="field-lbl">Date planted</label>
              <input type="date" className="date-input" value={date} max={today()} onChange={e=>setDate(e.target.value)}/>
              <button className="btn-primary" onClick={confirmAdd}>Add to My Garden</button>
              <button className="btn-cancel" onClick={()=>{setShowDate(false);setPending(null);}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showEdit && editing && editPlant && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowEdit(false);}}>
          <div className="sheet">
            <div className="handle"/>
            <div className="sh-title">Edit Entry</div>
            <div className="sh-body">
              <div className="edit-preview">
                <div className="em">{editPlant.emoji}</div>
                <div className="nm">{editPlant.name}</div>

                {[{key:'pot',icon:'🪴',label:'Pot',ok:editPlant.pot},{key:'ground',icon:'🌍',label:'Ground',ok:editPlant.ground},{key:'hydro',icon:'💧',label:'Hydroponic',ok:!!editPlant.hydro}].map(m=>(

              <label className="field-lbl">Date planted</label>
              <input type="date" className="date-input" value={date} max={today()} onChange={e=>setDate(e.target.value)}/>

              <button className="btn-del" onClick={del}>Remove from Garden</button>
              <button className="btn-cancel" onClick={()=>setShowEdit(false)}>Cancel</button>

});

const DIARY_KEY = 'gardenDiaryV1';

function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  {id:'planted',     label:'Planted',       emoji:'🌱'},

  {id:'treatedpests',label:'Treated pests', emoji:'🐛'},
];

const WEATHER_OPTS = [
  {id:'sunny',        emoji:'☀️',  label:'Sunny'},
  {id:'partlycloudy', emoji:'⛅',  label:'Partly cloudy'},
  {id:'overcast',     emoji:'☁️',  label:'Overcast'},
  {id:'rainy',        emoji:'🌧️', label:'Rainy'},
  {id:'stormy',       emoji:'⛈️', label:'Stormy'},
  {id:'frost',        emoji:'❄️',  label:'Frost'},
];

function dotColor(entry) {
  if (entry.tasks?.harvested)      return '#F59E0B';
  if (entry.tasks?.treatedpests)   return '#EF4444';
  if (entry.tasks?.planted)        return '#3D6B4E';
  if (entry.tasks?.pruned)         return '#8B5A2B';
  if (entry.tasks?.fertilised)     return '#00897B';
  if (entry.tasks?.watered)        return '#1565C0';
  return '#ADADAD';
}

function getDayDots(dayEntries) {
  const seen = new Set(); const dots = [];
  for (const e of dayEntries) {
    const c = dotColor(e);
    if (!seen.has(c)) { seen.add(c); dots.push(c); }
    if (dots.length >= 3) break;
  }
  return dots;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDateLong(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

// ─── PHOTO LIGHTBOX ──────────────────────────────────────────────
function PhotoLightbox({src, onClose}) {
  const [scale, setScale] = useState(1);
  const [pos,   setPos]   = useState({x:0, y:0});
  const stRef = useRef({scale:1, pos:{x:0,y:0}, pinch:null, touch:null, lastTap:0});
  const elRef = useRef(null);

  useEffect(()=>{
    const el = elRef.current;
    if (!el) return;
    function d(a,b){ return Math.hypot(b.clientX-a.clientX, b.clientY-a.clientY); }
    function onStart(e){
      const s = stRef.current;
      if (e.touches.length===2){
        s.pinch = {dist:d(e.touches[0],e.touches[1]), scale:s.scale, pos:{...s.pos}};
        s.touch = null;
      } else if (e.touches.length===1){
        const now = Date.now();
        if (now - s.lastTap < 280){
          if (s.scale>1){ s.scale=1; s.pos={x:0,y:0}; }
          else { s.scale=2.5; }
          setScale(s.scale); setPos({...s.pos});
          s.lastTap=0; return;
        }
        s.lastTap=now;
        s.touch={x:e.touches[0].clientX, y:e.touches[0].clientY, pos:{...s.pos}};
        s.pinch=null;
      }
    }
    function onMove(e){
      e.preventDefault();
      const s=stRef.current;
      if (e.touches.length===2 && s.pinch){
        const ratio = d(e.touches[0],e.touches[1]) / s.pinch.dist;
        s.scale = Math.max(1, Math.min(6, s.pinch.scale*ratio));
        if (s.scale<=1) s.pos={x:0,y:0};
        setScale(s.scale); setPos({...s.pos});
      } else if (e.touches.length===1 && s.touch && s.scale>1){
        s.pos={x:s.touch.pos.x+(e.touches[0].clientX-s.touch.x), y:s.touch.pos.y+(e.touches[0].clientY-s.touch.y)};
        setPos({...s.pos});
      }
    }
    function onEnd(e){
      const s=stRef.current;
      if (e.touches.length<2) s.pinch=null;
      if (e.touches.length===0){ s.touch=null; if(s.scale<1){s.scale=1;s.pos={x:0,y:0};setScale(1);setPos({x:0,y:0});} }
    }
    el.addEventListener('touchstart',onStart,{passive:false});
    el.addEventListener('touchmove', onMove, {passive:false});
    el.addEventListener('touchend',  onEnd,  {passive:false});
    return ()=>{ el.removeEventListener('touchstart',onStart); el.removeEventListener('touchmove',onMove); el.removeEventListener('touchend',onEnd); };
  },[]);

  return (
    <div ref={elRef} className="photo-lightbox"
      onClick={()=>{ if(stRef.current.scale<=1) onClose(); }}>
      <img className="photo-lightbox-img" src={src} alt=""
        style={{transform:`translate(${pos.x}px,${pos.y}px) scale(${scale})`, transition:scale===1?'transform 0.25s':'none'}}/>
      <button className="photo-lightbox-close" onClick={e=>{e.stopPropagation();onClose();}}>✕</button>
    </div>
  );
}

function DiaryCard({entry, onEdit, gardenEntries, onOpenGardenEntry}) {
  const [lightboxSrc, setLightboxSrc] = useState(null);

  const activeTasks = TASK_DEFS.filter(t=>entry.tasks?.[t.id]);
  const linkedGarden = (entry.gardenIds||[]).map(gid=>{
    const ge = (gardenEntries||[]).find(e=>e.id===gid);
    if (!ge) return null;
    const plant = PLANTS.find(p=>p.id===ge.plantId);
    return plant ? {ge, plant} : null;
  }).filter(Boolean);
  const photos = entry.photos||[];
  const hasContent = activeTasks.length>0 || linkedGarden.length>0 || entry.notes || photos.length>0;
  return (
    <div style={{display:'contents'}}>
      {lightboxSrc && <PhotoLightbox src={lightboxSrc} onClose={()=>setLightboxSrc(null)}/>}

        <div className="diary-card-photos">
          {photos.map((src,i)=>(

          {activeTasks.map(t=><span key={t.id} className="diary-task-chip">{t.emoji} {t.label}</span>)}

// ─── DIARY ENTRY FORM ────────────────────────────────────────────
function DiaryForm({entry, onSave, onDelete, onCancel, gardenEntries}) {
  const [form, setForm] = useState({
    ...entry,
    tasks:     {...entry.tasks},
    gardenIds: [...(entry.gardenIds||[])],
    photos:    [...(entry.photos||[])],
  });
  const [search,  setSearch]  = useState('');
  const [picking, setPicking] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const fileRef = React.useRef(null);

  function toggleTask(id) { setForm(f=>({...f,tasks:{...f.tasks,[id]:!f.tasks[id]}})); }
  function setWx(id)       { setForm(f=>({...f,weather:f.weather===id?null:id})); }
  function toggleGarden(id) {
    setForm(f=>{ const ids=f.gardenIds.includes(id)?f.gardenIds.filter(x=>x!==id):[...f.gardenIds,id]; return {...f,gardenIds:ids}; });
  }
  function removePhoto(i) { setForm(f=>({...f,photos:f.photos.filter((_,pi)=>pi!==i)})); }

  async function handlePhotoFile(e) {
    const files = Array.from(e.target.files||[]);
    if (!files.length) return;
    const compressed = await Promise.all(files.map(compressImage));
    setForm(f=>({...f,photos:[...f.photos,...compressed]}));
    e.target.value = '';
  }

  // Garden entries with their plant info, filtered by search
  const filtGarden = (gardenEntries||[])
    .map(ge=>{ const plant=PLANTS.find(p=>p.id===ge.plantId); return plant?{ge,plant}:null; })
    .filter(Boolean)
    .filter(({ge,plant})=>{
      if (!search) return true;
      const ql=search.toLowerCase();
      return (ge.nickname||'').toLowerCase().includes(ql)||plant.name.toLowerCase().includes(ql);
    })
    .sort((a,b)=>(a.ge.nickname||a.plant.name).localeCompare(b.ge.nickname||b.plant.name));

  const canSave = form.weather || Object.values(form.tasks).some(Boolean) || form.notes?.trim() || form.gardenIds.length>0 || form.photos.length>0;

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onCancel();}}>
      <div className="sheet" style={{maxHeight:'92vh'}}>
        <div className="handle"/>
        <div className="sh-title">{form.id?'Edit entry':'New entry'}</div>
        <div className="sh-body">

          {/* Date */}
          <span className="field-lbl">Date</span>
          <input type="date" className="date-input" value={form.date}
            onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>

          {/* Weather */}
          <span className="field-lbl">Weather</span>
          <div className="diary-wx-row">
            {WEATHER_OPTS.map(o=>(
              <button key={o.id} className={`diary-wx-btn${form.weather===o.id?' active':''}`} onClick={()=>setWx(o.id)}>
                <span className="diary-wx-icon">{o.emoji}</span>
                <span className="diary-wx-lbl">{o.label}</span>
              </button>
            ))}
          </div>

          {/* Tasks */}
          <span className="field-lbl">Tasks done</span>
          <div className="diary-task-grid">
            {TASK_DEFS.map(t=>(
              <button key={t.id} className={`diary-task-btn${form.tasks[t.id]?' active':''}`} onClick={()=>toggleTask(t.id)}>
                <span className="diary-task-icon">{t.emoji}</span>
                <span className="diary-task-lbl">{t.label}</span>
                {form.tasks[t.id] && <span className="diary-task-tick">✓</span>}
              </button>
            ))}
          </div>

          {/* Photos */}
          <span className="field-lbl">Photos <span style={{color:'var(--sub)',fontWeight:400}}>(optional)</span></span>
          <div className="diary-photos-row">
            {form.photos.map((src,i)=>(
              <div key={i} className="diary-photo-del">
                <img className="diary-photo-thumb" src={src} alt=""/>
                <button className="diary-photo-del-btn" onClick={()=>removePhoto(i)}>×</button>
              </div>
            ))}
            <button className="diary-photo-add-btn" onClick={()=>fileRef.current?.click()}>
              <span>📷</span>
              <span className="diary-photo-add-lbl">Add photo</span>
            </button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment"
              multiple style={{display:'none'}} onChange={handlePhotoFile}/>
          </div>

          {/* My Garden plants */}
          <span className="field-lbl">My Garden plants <span style={{color:'var(--sub)',fontWeight:400}}>(optional)</span></span>
          {form.gardenIds.length>0 && (
            <div className="diary-sel-plants">
              {form.gardenIds.map(id=>{
                const ge=(gardenEntries||[]).find(e=>e.id===id);
                const plant=ge?PLANTS.find(p=>p.id===ge.plantId):null;
                return plant?(
                  <span key={id} className="diary-sel-plant" onClick={()=>toggleGarden(id)}>
                    {plant.emoji} {ge.nickname||plant.name} ×
                  </span>
                ):null;
              })}
            </div>
          )}
          {(gardenEntries||[]).length===0
            ? <div style={{fontSize:13,color:'var(--sub)',padding:'8px 0'}}>Add plants to My Garden tab first</div>
            : !picking
              ? <button className="diary-plant-add-btn" onClick={()=>setPicking(true)}>+ Link garden plants</button>
              : <div className="diary-picker-wrap">
                  <input className="nick-input" placeholder="Search your garden…" value={search} onChange={e=>setSearch(e.target.value)}/>
                  <div className="diary-picker-list">
                    {filtGarden.length===0
                      ? <div style={{padding:'10px 6px',color:'var(--sub)',fontSize:13}}>No plants found</div>
                      : filtGarden.map(({ge,plant})=>(
                          <div key={ge.id} className={`diary-picker-row${form.gardenIds.includes(ge.id)?' sel':''}`}
                            onClick={()=>toggleGarden(ge.id)}>
                            <span>{plant.emoji} {ge.nickname||plant.name}
                              {ge.nickname && <span style={{color:'var(--sub)',fontWeight:400,fontSize:11}}> · {plant.name}</span>}
                            </span>
                            {form.gardenIds.includes(ge.id) && <span style={{color:'var(--green)',fontWeight:700}}>✓</span>}
                          </div>
                        ))
                    }
                  </div>
                  <button className="btn-cancel" style={{marginTop:6}} onClick={()=>setPicking(false)}>Done</button>
                </div>
          }

          {/* Notes */}
          <span className="field-lbl">Notes</span>
          <textarea className="notes-input" rows={4}
            placeholder="What did you observe? Any problems, successes, or things to remember…"
            value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>

          <button className="btn-primary" style={canSave?{}:{opacity:0.4,pointerEvents:'none'}} onClick={()=>onSave(form)}>
            Save entry
          </button>
          {onDelete && !confirmDel && (
            <button className="btn-del" onClick={()=>setConfirmDel(true)}>Delete entry</button>
          )}
          {onDelete && confirmDel && (
            <div className="del-confirm">
              <span className="del-confirm-msg">Delete this entry?</span>
              <button className="del-confirm-yes" onClick={onDelete}>Yes, delete</button>
              <button className="del-confirm-no" onClick={()=>setConfirmDel(false)}>Cancel</button>
            </div>
          )}
          <button className="btn-cancel" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ─── DIARY TAB ───────────────────────────────────────────────────
function DiaryTab({gardenEntries, diary, setDiary, initDate, onOpenGardenEntry}) {
  const now = new Date();
  const [viewYear,  setViewYear]  = useState(initDate ? Number(initDate.slice(0,4)) : now.getFullYear());
  const [viewMonth, setViewMonth] = useState(initDate ? Number(initDate.slice(5,7))-1 : now.getMonth());
  const [selDate,   setSelDate]   = useState(initDate||null);
  const [showForm,  setShowForm]  = useState(false);
  const [editEntry, setEditEntry] = useState(null);

  // Date → entries map
  const byDate = {};
  diary.forEach(e=>{ (byDate[e.date]=byDate[e.date]||[]).push(e); });

  // Calendar
  const monthLabel = new Date(viewYear,viewMonth).toLocaleDateString('en-NZ',{month:'long',year:'numeric'});
  const firstDow   = new Date(viewYear,viewMonth,1).getDay();
  const daysInMo   = new Date(viewYear,viewMonth+1,0).getDate();
  const today      = todayStr();

  function prevMo() { if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1); }
  function nextMo() { if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1); }
  function mkDate(day) { return `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; }

  function openNew(date) {
    setEditEntry({id:null,date:date||today,weather:null,tasks:{},gardenIds:[],photos:[],notes:''});
    setShowForm(true);
  }
  function openEdit(entry) {
    setEditEntry({...entry,tasks:{...entry.tasks},gardenIds:[...(entry.gardenIds||[])],photos:[...(entry.photos||[])]});
    setShowForm(true);
  }
  function save(entry) {
    if(entry.id) setDiary(prev=>prev.map(e=>e.id===entry.id?entry:e));
    else setDiary(prev=>[{...entry,id:genId()},...prev]);
    setShowForm(false); setEditEntry(null);
  }
  function del(id) { setDiary(prev=>prev.filter(e=>e.id!==id)); setShowForm(false); setEditEntry(null); }

  const selEntries = selDate?(byDate[selDate]||[]):[];

  return (
    <div>
      <div className="hdr">
        <h1>Garden Diary</h1>
        <div className="hdr-sub">{diary.length} entr{diary.length!==1?'ies':'y'}</div>
      </div>

      {/* ── Calendar ── */}
      <div className="diary-cal">
        <div className="cal-nav">
          <button className="cal-nav-btn" onClick={prevMo}>‹</button>
          <div className="cal-month">{monthLabel}</div>
          <button className="cal-nav-btn" onClick={nextMo}>›</button>
        </div>
        <div className="cal-dow">
          {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} className="cal-dow-cell">{d}</div>)}
        </div>
        <div className="cal-grid">
          {Array.from({length:firstDow}).map((_,i)=><div key={'x'+i} className="cal-cell empty"/>)}
          {Array.from({length:daysInMo}).map((_,i)=>{
            const day = i+1;
            const ds  = mkDate(day);
            const dots= getDayDots(byDate[ds]||[]);
            const isTd= ds===today;
            const isSl= ds===selDate;
            return (
              <div key={day} className={`cal-cell${isTd?' today':''}${isSl?' selected':''}`}
                onClick={()=>setSelDate(prev=>prev===ds?null:ds)}>
                <span className="cal-day-num">{day}</span>
                {dots.length>0 && <div className="cal-dots">{dots.map((c,di)=><span key={di} className="cal-dot" style={{background:c}}/>)}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Dot legend ── */}
      <div className="diary-legend">
        {[
          {color:'#F59E0B', label:'Harvested'},
          {color:'#EF4444', label:'Pest treated'},
          {color:'#3D6B4E', label:'Planted'},
          {color:'#8B5A2B', label:'Pruned'},
          {color:'#00897B', label:'Fertilised'},
          {color:'#1565C0', label:'Watered'},
          {color:'#ADADAD', label:'Notes only'},
        ].map(({color,label})=>(
          <div key={label} className="diary-legend-item">
            <span className="diary-legend-dot" style={{background:color}}/>
            <span className="diary-legend-lbl">{label}</span>
          </div>
        ))}
      </div>

      {/* ── Selected date ── */}
      {selDate && (
        <div className="diary-day-sec">
          <div className="diary-day-hdr">
            <div className="diary-day-lbl">{fmtDateLong(selDate)}</div>
            <button className="diary-add-btn" onClick={()=>openNew(selDate)}>+ Add entry</button>
          </div>
          {selEntries.length===0
            ? <div className="diary-empty-day">No entries yet — tap <strong>Add entry</strong> to start.</div>
            : selEntries.map(e=><DiaryCard key={e.id} entry={e} onEdit={()=>openEdit(e)} gardenEntries={gardenEntries} onOpenGardenEntry={onOpenGardenEntry}/>)
          }
        </div>
      )}

      {/* ── Empty state ── */}
      {!selDate && diary.length===0 && (
        <div className="empty">
          <div className="empty-icon">📔</div>
          <div className="empty-title">Your diary is empty</div>
          <div className="empty-sub">Tap any date on the calendar above to add your first entry</div>
        </div>
      )}
      {!selDate && diary.length>0 && (
        <div style={{textAlign:'center',padding:'24px 16px',color:'var(--sub)',fontSize:14}}>
          Tap a date to view or add entries
        </div>
      )}

      {/* ── Form ── */}
      {showForm && editEntry && (
        <DiaryForm
          entry={editEntry}
          onSave={save}
          onDelete={editEntry.id?()=>del(editEntry.id):null}
          onCancel={()=>{setShowForm(false);setEditEntry(null);}}
          gardenEntries={gardenEntries}
        />
      )}
    </div>
  );
}

// ─── BOTTOM NAV ─────────────────────────────────────────────────
function BottomNav({tab, setTab, count}) {
  const tabs = [{id:'library',icon:'📚',label:'Library'},{id:'garden',icon:'🌿',label:'My Garden'},{id:'diary',icon:'📔',label:'Diary'}];
  return (
    <div className="bnav">
      {tabs.map(t=>(
        <div key={t.id} className={`nav-tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
          <span className="nav-icon">{t.icon}</span>
          <span className="nav-lbl">{t.label}</span>
          {t.id==='garden' && count>0 && <span className="nav-badge">{count}</span>}
        </div>
      ))}
    </div>
  );
}

// ─── APP ROOT ───────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('library');
  const [entries, setEntries] = useState(()=>{ try{ const s=localStorage.getItem('gardenV1'); return s?JSON.parse(s):[]; }catch{return [];} });
  const [diary,   setDiary]   = useState(()=>{ try{ const s=localStorage.getItem(DIARY_KEY);  return s?JSON.parse(s):[]; }catch{return [];} });
  const [initPlant,        setInitPlant]        = useState(null);
  const [diaryInitDate,    setDiaryInitDate]    = useState(null);
  const [gardenInitEntry,  setGardenInitEntry]  = useState(null);
  const gardenRef  = React.useRef(null);
  const libraryRef = React.useRef(null);
  const screenRef  = React.useRef(null);

  useEffect(()=>{ try{ localStorage.setItem('gardenV1',JSON.stringify(entries)); }catch{} },[entries]);
  useEffect(()=>{ try{ localStorage.setItem(DIARY_KEY, JSON.stringify(diary));   }catch{} },[diary]);

  const [showBackup, setShowBackup] = useState(false);
  const importRef = useRef(null);

  async function exportData() {
    const data = { version: 1, exportedAt: new Date().toISOString(), garden: entries, diary };
    const json = JSON.stringify(data, null, 2);
    const filename = `garden-backup-${new Date().toISOString().slice(0,10)}.json`;

    // 1. Web Share API with file attachment (iOS 15+, modern Android)
    if (navigator.share) {
      try {
        const file = new File([json], filename, { type: 'application/json' });
        const canFile = navigator.canShare && navigator.canShare({ files: [file] });
        await navigator.share(canFile
          ? { files: [file], title: 'Garden Backup' }
          : { title: 'Garden Backup', text: json }
        );
        setShowBackup(false);
        return;
      } catch(e) {
        if (e.name === 'AbortError') { setShowBackup(false); return; }
        // share failed — fall through
      }
    }

    // 2. Standard blob download (desktop browsers)
    try {
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
      setShowBackup(false);
      return;
    } catch(e) {}

    // 3. Last resort — copy to clipboard
    try {
      await navigator.clipboard.writeText(json);
      alert('Backup copied to clipboard. Paste it into a text file or Notes to save it.');
    } catch(e) {
      alert('Export not supported on this browser. Try opening the app in Safari instead.');
    }
    setShowBackup(false);
  }

  function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data.garden) || !Array.isArray(data.diary)) { alert('Invalid backup file.'); return; }
        const msg = `Restore ${data.garden.length} garden plant${data.garden.length!==1?'s':''} and ${data.diary.length} diary entr${data.diary.length!==1?'ies':'y'}?\n\nThis will replace your current data.`;
        if (!window.confirm(msg)) return;
        setEntries(data.garden);
        setDiary(data.diary);
        setShowBackup(false);
      } catch { alert('Could not read the backup file. Make sure it is a valid garden backup.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function handleAdd(p){ setInitPlant(p); setTab('garden'); }

  function handleOpenDiaryDate(date) { setDiaryInitDate(date); setTab('diary'); }
  function handleOpenGardenEntry(id) { setGardenInitEntry(id); setTab('garden'); }

  function handleTabSelect(id) {
    if (id === 'library' && tab === 'library') {
      libraryRef.current?.closeDetail();
      return;
    }
    if (id === 'garden' && tab === 'garden') {
      gardenRef.current?.closeDetail();
      return;
    }
    if (id !== 'diary') setDiaryInitDate(null);
    setTab(id);
    if (screenRef.current) screenRef.current.scrollTop = 0;
  }

  return (
    <div className="app">
      <div className="screen" ref={screenRef}>
        {tab==='library'  && <LibraryTab ref={libraryRef} onAdd={handleAdd}/>}
        {tab==='garden'   && <GardenTab ref={gardenRef} entries={entries} onUpdate={setEntries} initPlant={initPlant} clearInit={()=>setInitPlant(null)} diary={diary} onOpenDiaryDate={handleOpenDiaryDate} initEntryId={gardenInitEntry} clearInitEntry={()=>setGardenInitEntry(null)}/>}
        {tab==='diary'    && <DiaryTab gardenEntries={entries} diary={diary} setDiary={setDiary} initDate={diaryInitDate} onOpenGardenEntry={handleOpenGardenEntry}/>}
      </div>
      <BottomNav tab={tab} setTab={handleTabSelect} count={entries.length}/>
      <button className="backup-fab" onClick={()=>setShowBackup(true)} title="Backup & Restore">☁</button>
      {showBackup && (
        <div className="backup-overlay" onClick={()=>setShowBackup(false)}>
          <div className="backup-sheet" onClick={e=>e.stopPropagation()}>
            <div className="backup-sheet-title">Backup & Restore</div>
            <div className="backup-sheet-desc">Export your garden and diary data to a file to keep it safe. Import a previous backup to restore your data.</div>
            <button className="backup-action" onClick={exportData}>
              <span className="backup-action-icon">⬇️</span>
              <div>
                <div>Export data</div>
                <div style={{fontSize:12,color:'var(--sub)',fontWeight:400,marginTop:2}}>{entries.length} plant{entries.length!==1?'s':''} · {diary.length} diary entr{diary.length!==1?'ies':'y'}</div>
              </div>
            </button>
            <button className="backup-action" onClick={()=>importRef.current?.click()}>
              <span className="backup-action-icon">⬆️</span>
              <div>Import backup</div>
            </button>
            <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportFile}/>
            <button className="backup-cancel" onClick={()=>setShowBackup(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
